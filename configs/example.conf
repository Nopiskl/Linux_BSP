#!/bin/bash
# Example Configuration
# Template configuration file

BOARD_NAME="example-board"
DEVICE_DTS="vendor/device-dts"
ARCH="arm64"
KERNEL_BRANCH="bsp"
KERNEL_GCC="aarch64-linux-gnu-"
BOOTARGS="root=LABEL=rootfs rootwait rootfstype=ext4 console=ttyS0,115200"

case "${KERNEL_TARGET}" in
    bsp)
        LINUX_REPO="https://github.com/your-org/linux.git"
        LINUX_GITEE_REPO="https://gitee.com/your-org/linux.git"
        LINUX_BRANCH="linux-5.15"
        LINUX_CONFIG="your_defconfig"
        LINUX_PATHDIR="none"
        ;;
    mainline)
        LINUX_REPO="https://github.com/torvalds/linux.git"
        LINUX_GITEE_REPO=""
        LINUX_BRANCH="v6.6"
        LINUX_CONFIG="your_mainline_defconfig"
        LINUX_PATHDIR="your-patch-dir"
        ;;
esac

setup_dhcp(){
    echo "Example board setup_dhcp"
}

BL_CONFIG="sunxi-uboot"
UBOOT_REPO="https://github.com/u-boot/u-boot.git"
UBOOT_BRANCH="v2023.10"
ATF_REPO="https://github.com/ARM-software/arm-trusted-firmware.git"
