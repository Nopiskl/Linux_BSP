#!/bin/bash
# 配置模板 - 复制此文件创建新板型配置
# 使用方法: cp example.conf myboard.conf

# ============================================
# 基本信息（必改）
# ============================================

BOARD_NAME="example-board"              # 你的板型名称
ARCH="arm64"                            # CPU架构: arm64 或 arm
KERNEL_GCC="aarch64-linux-gnu-"         # ARM64 交叉编译器
                                        # ARM32 用: arm-linux-gnueabihf-

# ============================================
# 内核配置（必改）
# ============================================

# Linux 5.15 kernel configure
LINUX_REPO="https://github.com/AvaotaSBC/linux.git"
LINUX_GITEE_REPO="https://github.com/AvaotaSBC/linux.git"
LINUX_BRANCH="linux-5.15"
LINUX_CONFIG="sun55i_t527_bsp_defconfig"
LINUX_PATHDIR="none"
;;
# ============================================
# Bootloader 配置（使用自定义 Bootloader）
# ============================================

BL_CONFIG="custom"                      # 自定义 Bootloader

# 根据你的 Bootloader 实现方式，配置以下内容：

# 方式1：从 Git 仓库构建
# CUSTOM_BL_REPO="https://github.com/your-org/bootloader.git"
# CUSTOM_BL_BRANCH="main"

# 方式2：使用预编译文件
# CUSTOM_BL_BINARY="path/to/bootloader.bin"

# ============================================
# 可选配置
# ============================================

DEVICE_DTS="vendor/device-dts"          # 设备树（一般自动识别）
BOOTARGS="root=LABEL=rootfs rootwait rootfstype=ext4 console=ttyS0,115200"

setup_dhcp(){
    echo "Board network setup"
}
