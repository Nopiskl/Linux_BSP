#!/bin/bash
# Orange Pi Zero3 - Allwinner H618 mainline board support

# ============================================
# Board identity
# ============================================

BOARD_NAME="orangepi-zero3"
TARGET_BOARD="orangepi-zero3"

# Source-tree fallback targets. The SDK first checks configs/target/${TARGET_BOARD}/.
# Empty or missing target files fall back to the Linux/U-Boot source tree.
KERNEL_DTS="allwinner/sun50i-h618-orangepi-zero3"
UBOOT_DTS="allwinner/sun50i-h618-orangepi-zero3"

# ============================================
# Architecture
# ============================================

ARCH="arm64"                      # 内核架构
UBOOT_ARCH="arm64"                # U-Boot 架构
ATF_ARCH=""                       # ATF 架构（不设置时使用 UBOOT_ARCH）

# ============================================
# Toolchains
# ============================================

KERNEL_GCC="aarch64-linux-gnu-"   # 内核工具链
UBOOT_GCC="aarch64-linux-gnu-"    # U-Boot 工具链
ATF_GCC="aarch64-linux-gnu-"      # ATF 工具链

# ============================================
# Kernel
# ============================================

LINUX_REPO="https://github.com/torvalds/linux.git"
LINUX_GITEE_REPO=""
LINUX_BRANCH="master"
KERNEL_DEFCONFIG="defconfig"
LINUX_PATHDIR="none"

# ============================================
# Bootloader
# ============================================

BL_CONFIG="mainline-uboot"
UBOOT_REPO="https://github.com/u-boot/u-boot.git"
UBOOT_BRANCH="master"
UBOOT_DEFCONFIG="orangepi_zero3_defconfig"
BL_PATCHDIR="none"

# ============================================
# ARM Trusted Firmware
# ============================================

BUILD_ATF="yes"
ATF_REPO="https://github.com/ARM-software/arm-trusted-firmware.git"
ATF_BRANCH="master"
ATF_PLAT="sun50i_h616"

# ============================================
# Boot arguments
# ============================================

BOOTARGS="root=LABEL=rootfs rootwait rootfstype=ext4 console=ttyS0,115200 rw init=/sbin/init fsck.fix=yes fsck.repair=yes net.ifnames=0"

# ============================================
# Optional board hooks
# ============================================

setup_dhcp(){
    echo "Board network setup"
}
