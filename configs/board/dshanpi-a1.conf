#!/bin/bash
# DshanPi A1 - Rockchip RK3576 board support

# ============================================
# Board identity
# ============================================

BOARD_NAME="dshanpi-a1"
TARGET_BOARD="dshanpi-a1"

# Source-tree fallback targets. The SDK first checks configs/target/${TARGET_BOARD}/.
# Empty or missing target files fall back to the Linux/U-Boot source tree.
KERNEL_DTS="rockchip/rk3576-100ask-dshanpi-a1"
UBOOT_DTS="rockchip/rk3576-100ask-dshanpi-a1"

# ============================================
# Architecture
# ============================================

ARCH="arm64"                      # 内核架构
UBOOT_ARCH=""                     # U-Boot 架构（不设置时使用 ARCH）
ATF_ARCH=""                       # ATF 架构（不设置时使用 UBOOT_ARCH）

# ============================================
# Toolchains
# ============================================

KERNEL_GCC="aarch64-linux-gnu-"   # 内核工具链
UBOOT_GCC="aarch64-linux-gnu-"    # U-Boot 工具链
ATF_GCC="aarch64-linux-gnu-"      # ATF 工具链

# ============================================
# Kernel
# ============================================

LINUX_REPO="https://github.com/rockchip-linux/kernel.git"
LINUX_GITEE_REPO="https://gitee.com/rockchip-linux/kernel.git"
LINUX_BRANCH="develop-6.1"
KERNEL_DEFCONFIG="rockchip_linux_defconfig"
LINUX_PATHDIR="none"

# ============================================
# Bootloader
# ============================================

BL_CONFIG="rockchip-uboot"
UBOOT_REPO="https://github.com/dshanpi/dshanpi-a1-uboot.git"
UBOOT_BRANCH="master"
UBOOT_DEFCONFIG="dshanpi-a1-rk3576_defconfig"
BL_PATCHDIR="none"

# ============================================
# Rockchip binaries
# ============================================

RKBIN_REPO="https://github.com/rockchip-linux/rkbin.git"
RKBIN_BRANCH_HASH="74213af1e952c4683d2e35952507133b61394862"
BL31_PATH="bin/rk35/rk3576_bl31_v1.20.elf"
TEE_PATH="bin/rk35/rk3576_bl32_v1.06.bin"
DDRBIN_PATH="bin/rk35/rk3576_ddr_lp4_2112MHz_lp5_2736MHz_v1.09.bin"

# ============================================
# Boot arguments
# ============================================

BOOTARGS="root=LABEL=rootfs rootwait earlyprintk console=ttyFIQ0,1500000 rw rootfstype=ext4 init=/sbin/init net.ifnames=0"

# ============================================
# Optional board hooks
# ============================================

setup_dhcp(){
    echo "Board network setup"
}
