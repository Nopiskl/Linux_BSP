#!/bin/bash
# 测试板型配置
# 用于测试 BSP 构建流程

# ============================================
# 基本信息
# ============================================

BOARD_NAME="test-board"                # 测试板型
ARCH="arm64"                           # ARM64 架构
KERNEL_GCC="aarch64-linux-gnu-"        # ARM64 交叉编译器

# ============================================
# 内核配置
# ============================================

# Linux 官方主线内核
LINUX_REPO="https://github.com/torvalds/linux.git"
LINUX_GITEE_REPO=""
LINUX_BRANCH="v6.6"                # Linux 6.6 版本
LINUX_CONFIG="defconfig"           # 默认配置
LINUX_PATHDIR="none"

# ============================================
# Bootloader 配置
# ============================================

BL_CONFIG="custom"                     # 自定义 Bootloader

# ============================================
# 可选配置
# ============================================

DEVICE_DTS="test/test-board"
BOOTARGS="root=LABEL=rootfs rootwait rootfstype=ext4 console=ttyS0,115200"

setup_dhcp(){
    echo "Test board setup"
}
