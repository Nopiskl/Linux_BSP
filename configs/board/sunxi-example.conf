#!/bin/bash
# Allwinner (Sunxi) 平台配置示例
# 使用方法: cp sunxi-example.conf myboard.conf

# ============================================
# 基本信息（必改）
# ============================================

BOARD_NAME="sunxi-xxx-board"              # 你的板型名称

# ============================================
# CPU 架构配置
# ============================================
ARCH="arm64"                               # 内核架构: arm64 或 arm
UBOOT_ARCH="arm"                           # U-Boot 架构: arm64 或 arm
                                           # 全志平台通常 U-Boot 用 arm，内核用 arm64
                                           # 如不设置则使用 ARCH
ATF_ARCH=""                                # ATF 架构（通常不需要设置）
                                           # 如不设置则使用 UBOOT_ARCH

# ============================================
# 交叉编译工具链配置
# ============================================
KERNEL_GCC="aarch64-linux-gnu-"            # 内核交叉编译器 (ARM64)
                                           # ARM32 用: arm-linux-gnueabihf-
UBOOT_GCC="aarch64-linux-gnu-"             # U-Boot 交叉编译器
                                           # 可以与内核使用不同工具链
                                           # 如不设置则使用 KERNEL_GCC
ATF_GCC="aarch64-linux-gnu-"               # ATF 交叉编译器
                                           # 如不设置则使用 UBOOT_GCC

# ============================================
# 内核配置（必改）
# ============================================

# Linux 5.15 kernel configure
LINUX_REPO="https://github.com/xxx"
LINUX_GITEE_REPO="https://github.com/xxx"
LINUX_BRANCH="linux-5.15"
LINUX_CONFIG="xxx_defconfig"
LINUX_PATHDIR="none"

# ============================================
# Bootloader 配置（必改）
# ============================================

# 选择 Bootloader 类型：sunxi-uboot, rockchip-uboot, custom
BL_CONFIG="sunxi-uboot"

# ============================================
# Allwinner U-Boot 配置（当 BL_CONFIG="sunxi-uboot" 时）
# ============================================

# U-Boot 仓库和分支
UBOOT_REPO="https://github.com/u-boot/u-boot.git"
UBOOT_BRANCH="master"

# U-Boot defconfig 名称
# 优先级顺序：
#   1. ${WORKSPACE}/uboot_user_defconfig (menuconfig 保存的)
#   2. BSP_T527/configs/target/defconfig/uboot/${BL_CONF}
#   3. BSP_T527/configs/target/defconfig/uboot/${BL_CONF}.config
#   4. u-boot源码中的 configs/${BL_CONF}
#   5. u-boot源码中已有的 .config
BL_CONF="sun50i_defconfig"

# U-Boot 补丁目录（可选，放在 patches/uboot/${BL_PATCHDIR}/ 下）
# 补丁结构：
#   patches/uboot/${BL_PATCHDIR}/patches/  - .patch 文件
#   patches/uboot/${BL_PATCHDIR}/files/    - 额外文件
BL_PATCHDIR="none"

# ATF (ARM Trusted Firmware) 配置
ATF_REPO="https://github.com/ARM-software/arm-trusted-firmware.git"
ATF_BRANCH="xxx"

# 内核启动参数
BOOTARGS="root=LABEL=rootfs rootwait rootfstype=ext4 console=ttyS0,115200"

# ============================================
# 可选函数
# ============================================

setup_dhcp(){
    echo "Board network setup"
}
