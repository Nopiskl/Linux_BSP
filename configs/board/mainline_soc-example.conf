#!/bin/bash
# Mainline SoC 平台配置示例
# 使用方法: cp mainline_soc-example.conf myboard.conf

# ============================================
# Board identity（必改）
# ============================================

BOARD_NAME="mainline-soc-board"           # 你的板型名称
TARGET_BOARD="mainline-soc-board"         # configs/target/${TARGET_BOARD}

# 源码回退目标。SDK 会优先检查 configs/target/${TARGET_BOARD}/，
# target 文件不存在或为空时才使用这里指定的源码自带 DTS。
KERNEL_DTS="vendor/board"
UBOOT_DTS="vendor/board"

# ============================================
# Architecture
# ============================================
ARCH="arm64"                               # 内核架构: arm64 或 arm
UBOOT_ARCH="arm64"                         # U-Boot 架构: arm64 或 arm
                                           # ARM64 平台通常 U-Boot 与内核都使用 arm64
                                           # 如不设置则使用 ARCH
ATF_ARCH=""                                # ATF 架构（通常不需要设置）
                                           # 如不设置则使用 UBOOT_ARCH

# ============================================
# Toolchains
# ============================================
KERNEL_GCC="aarch64-linux-gnu-"            # 内核交叉编译器 (ARM64)
                                           # ARM32 用: arm-linux-gnueabihf-
UBOOT_GCC="aarch64-linux-gnu-"             # U-Boot 交叉编译器
                                           # 可以与内核使用不同工具链
                                           # 如不设置则使用 KERNEL_GCC
ATF_GCC="aarch64-linux-gnu-"               # ATF 交叉编译器
                                           # 如不设置则使用 UBOOT_GCC

# ============================================
# Kernel（必改）
# ============================================

LINUX_REPO="https://github.com/torvalds/linux.git"
LINUX_GITEE_REPO=""
LINUX_BRANCH="master"
KERNEL_DEFCONFIG="defconfig"
LINUX_PATHDIR="none"

# ============================================
# Bootloader（必改）
# ============================================

# 选择 Bootloader 类型：mainline-uboot, rockchip-uboot
BL_CONFIG="mainline-uboot"

UBOOT_REPO="https://github.com/u-boot/u-boot.git"
UBOOT_BRANCH="master"
UBOOT_DEFCONFIG="xxx_defconfig"
BL_PATCHDIR="none"

# ============================================
# ARM Trusted Firmware
# ============================================

# 是否编译 ATF。未设置时，arm64 默认编译 ATF，arm32 默认跳过 ATF。
BUILD_ATF="yes"
ATF_REPO="https://github.com/ARM-software/arm-trusted-firmware.git"
ATF_BRANCH="xxx"

# ============================================
# Boot arguments
# ============================================

BOOTARGS="root=LABEL=rootfs rootwait rootfstype=ext4 console=ttyS0,115200"

# ============================================
# Optional board hooks
# ============================================

setup_dhcp(){
    echo "Board network setup"
}
