#!/bin/bash
# Rockchip 平台配置示例
# 使用方法: cp rk-example.conf myboard.conf

# ============================================
# Board identity（必改）
# ============================================

BOARD_NAME="rk3588-board"                  # 你的板型名称
TARGET_BOARD="rk3588-board"                # configs/target/${TARGET_BOARD}

# 源码回退目标。SDK 会优先检查 configs/target/${TARGET_BOARD}/，
# target 文件不存在或为空时才使用这里指定的源码自带 DTS。
KERNEL_DTS="rockchip/xxx-board"
UBOOT_DTS="rockchip/xxx-board"

# ============================================
# Architecture
# ============================================
ARCH="arm64"                               # 内核架构: arm64 或 arm
UBOOT_ARCH=""                              # U-Boot 架构: arm64 或 arm
                                           # RK 平台通常与内核架构相同
                                           # 如不设置则使用 ARCH
ATF_ARCH=""                                # ATF 架构（通常不需要设置）
                                           # 如不设置则使用 UBOOT_ARCH

# ============================================
# Toolchains
# ============================================
KERNEL_GCC="aarch64-linux-gnu-"            # 内核交叉编译器 (ARM64)
                                           # ARM32 用: arm-linux-gnueabihf-
UBOOT_GCC="aarch64-linux-gnu-"             # U-Boot 交叉编译器
                                           # 可以与内核使用不同工具链
                                           # 如不设置则使用 KERNEL_GCC
ATF_GCC="aarch64-linux-gnu-"               # ATF 交叉编译器
                                           # 如不设置则使用 UBOOT_GCC

# ============================================
# Kernel（必改）
# ============================================

LINUX_REPO="https://github.com/xxx"
LINUX_GITEE_REPO="https://github.com/xxx"
LINUX_BRANCH="linux-5.15"
KERNEL_DEFCONFIG="xxx_defconfig"
LINUX_PATHDIR="none"

# ============================================
# Bootloader（必改）
# ============================================

# 选择 Bootloader 类型：mainline-uboot, rockchip-uboot
BL_CONFIG="rockchip-uboot"

UBOOT_REPO="https://github.com/rockchip-linux/u-boot.git"
UBOOT_BRANCH="master"
UBOOT_DEFCONFIG="rk3588_defconfig"
BL_PATCHDIR="none"

# ============================================
# Rockchip binaries
# ============================================

# RKBIN 配置
RKBIN_REPO="https://github.com/rockchip-linux/rkbin.git"
RKBIN_BRANCH_HASH=""                    # 可选：指定特定 commit

# BL31/TEE/DDR 二进制文件路径（在 rkbin 仓库中）
# RK3588 示例：
BL31_PATH="bin/rk35/rk3588_bl31_v1.40.elf"
TEE_PATH="bin/rk35/rk3588_bl32_v1.12.bin"
DDRBIN_PATH="bin/rk35/rk3588_ddr_lp4_2112MHz_lp5_2736MHz_v1.11.bin"

# RK3568 示例：
# BL31_PATH="bin/rk35/rk3568_bl31_v1.34.elf"
# TEE_PATH="bin/rk35/rk3568_bl32_v2.09.bin"
# DDRBIN_PATH="bin/rk35/rk3568_ddr_1560MHz_v1.13.bin"

# RK3576 示例：
# BL31_PATH="bin/rk35/rk3576_bl31_v1.20.elf"
# TEE_PATH="bin/rk35/rk3576_bl32_v1.06.bin"
# DDRBIN_PATH="bin/rk35/rk3576_ddr_lp4_2112MHz_lp5_2736MHz_v1.09.bin"

# ============================================
# Boot arguments
# ============================================

BOOTARGS="root=LABEL=rootfs rootwait rootfstype=ext4 console=ttyS0,115200"

# ============================================
# Optional board hooks
# ============================================

setup_dhcp(){
    echo "Board network setup"
}
